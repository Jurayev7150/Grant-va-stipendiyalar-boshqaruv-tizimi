{% extends "base.html" %}
{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-person-plus-fill"></i> Talaba sifatida ro'yxatdan o'tish</h3>
                <form method="POST">

                    <h5 class="mb-3 text-primary">Akkount</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Parol (6+ belgi) *</label>
                            <input type="password" name="parol" class="form-control" required minlength="6">
                        </div>
                    </div>

                    <h5 class="mb-3 text-primary">Shaxsiy ma'lumotlar</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Ism *</label>
                            <input type="text" name="ism" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Familiya *</label>
                            <input type="text" name="familiya" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Otasining ismi</label>
                            <input type="text" name="otasining_ismi" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">JSHSHIR (14 raqam)</label>
                            <input type="text" name="jshshir" class="form-control" pattern="\d{14}" maxlength="14">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tug'ilgan sana *</label>
                            <input type="date" name="tugilgan_sana" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Jins *</label>
                            <select name="jins" class="form-select" required>
                                <option value="erkak">Erkak</option>
                                <option value="ayol">Ayol</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefon</label>
                            <input type="text" name="telefon" class="form-control" placeholder="+998 90 123 45 67">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Manzil</label>
                            <input type="text" name="manzil" class="form-control">
                        </div>
                    </div>

                    <h5 class="mb-3 text-primary">Ta'lim ma'lumotlari</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Universitet *</label>
                            <select name="universitet_id" id="universitet_id" class="form-select" required>
                                <option value="">-- tanlang --</option>
                                {% for u in universitetlar %}
                                <option value="{{ u.id }}">{{ u.nomi }} ({{ u.qisqa_nomi }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fakultet *</label>
                            <select name="fakultet_id" id="fakultet_id" class="form-select" required>
                                <option value="">-- avval universitetni tanlang --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Kurs *</label>
                            <select name="kurs" class="form-select" required>
                                {% for k in range(1, 7) %}
                                <option value="{{ k }}">{{ k }}-kurs</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">GPA (0–5)</label>
                            <input type="number" name="gpa" class="form-control" step="0.01" min="0" max="5">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Ro'yxatdan o'tish</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Universitet tanlanganda fakultetlarni filtrlash
    const fakultetlar = {{ fakultetlar | tojson }};
    const u_select = document.getElementById('universitet_id');
    const f_select = document.getElementById('fakultet_id');

    u_select.addEventListener('change', () => {
        const uid = parseInt(u_select.value);
        f_select.innerHTML = '<option value="">-- tanlang --</option>';
        fakultetlar
            .filter(f => f.universitet_id === uid)
            .forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = f.nomi;
                f_select.appendChild(opt);
            });
    });
</script>
{% endblock %}
