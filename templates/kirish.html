{% extends "base.html" %}
{% block title %}Tizimga kirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> Tizimga kirish</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Parol</label>
                        <input type="password" name="parol" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Kirish</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Akkountingiz yo'qmi?
                    <a href="{{ url_for('royxat') }}">Ro'yxatdan o'ting</a>
                </p>
            </div>
        </div>
        <div class="alert alert-info mt-3 small">
            <strong>Demo akkauntlar:</strong><br>
            Admin: <code>admin@grant.uz</code> / <code>admin123</code><br>
            Talaba: <code>aliyor@grant.uz</code> / <code>talaba123</code>
        </div>
    </div>
</div>
{% endblock %}
